<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub HTML Explorer</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-weight: 600;
            font-size: 2.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }
        
        input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            font-family: inherit;
            outline: none;
            transition: 0.3s ease;
            width: 100%;
            max-width: 500px;
            font-size: 1rem;
        }

        input::placeholder {
            color: #64748b;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Cards */
        .card {
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2), 0 0 15px var(--accent-glow);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
        }

        .icon {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 8px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }

        h3 {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.3;
            word-break: break-word;
            transition: color 0.3s;
        }

        .path {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: auto;
            word-break: break-all;
            padding-top: 10px;
        }

        /* Status & Loading */
        .status-container {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--card-border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
            display: none;
        }

        /* Fetching Title Animation */
        .fetching-text {
            color: #64748b;
            font-weight: 400;
            animation: pulse 1.5s infinite;
        }

        /* Animations */
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>HTML Repo Explorer</h1>
        <p class="subtitle">Discover and preview HTML files deployed on GitHub Pages</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 Search titles or file paths..." oninput="filterFiles()">
    </div>

    <div class="status-container" id="statusContainer">
        <div class="spinner" id="spinner"></div>
        <div id="statusText">Loading repository data...</div>
    </div>

    <div id="files" class="grid"></div>
</div>

<script>
// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(registration => console.log('ServiceWorker registered with scope:', registration.scope))
            .catch(error => console.error('ServiceWorker registration failed:', error));
    });
}
    // 👇 PUT YOUR GITHUB DETAILS HERE 👇
    const USER = "test3421699";
    const REPO = "New";
    const BRANCH = "main";
    // 👆 ============================= 👆

    let fetchedHtmlFiles = [];
    const titleCache = {}; // Cache titles so we don't redownload them when searching

    const filesContainer = document.getElementById("files");
    const statusContainer = document.getElementById("statusContainer");
    const statusText = document.getElementById("statusText");
    const spinner = document.getElementById("spinner");
    const searchInput = document.getElementById("searchInput");

    // 1. Fetch Repository Tree
    async function getRepoTree() {
        const url = `https://api.github.com/repos/${USER}/${REPO}/git/trees/${BRANCH}?recursive=1`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("Failed to fetch repository.");
        return await res.json();
    }

    // 2. Fetch specific file contents to extract the <title> tag
    async function getHtmlTitle(filePath) {
        if (titleCache[filePath]) return titleCache[filePath]; // Return from cache if already fetched

        const fileName = filePath.split("/").pop();
        try {
            const url = `https://raw.githubusercontent.com/${USER}/${REPO}/${BRANCH}/${filePath}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error();

            const html = await res.text();
            
            // Extract title using Regex
            const match = html.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
            if (match && match[1]) {
                // Decode HTML entities (like &amp;)
                const txt = document.createElement("textarea");
                txt.innerHTML = match[1].trim();
                const cleanTitle = txt.value;
                
                titleCache[filePath] = cleanTitle;
                return cleanTitle;
            }
        } catch (err) {
            console.warn(`Could not fetch title for ${filePath}`);
        }
        
        // Fallback to filename if no <title> exists
        titleCache[filePath] = fileName;
        return fileName;
    }

    // 3. Render the UI Cards
    function renderCards(filesToRender) {
        filesContainer.innerHTML = "";

        if (filesToRender.length === 0) {
            filesContainer.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #94a3b8;">No matching files found.</div>`;
            return;
        }

        filesToRender.forEach((file, index) => {
            const fileName = file.path.split("/").pop();
            const link = document.createElement("a");
            
            link.className = "card";
            link.href = `https://${USER}.github.io/${REPO}/${file.path}`;
            link.target = "_blank"; 
            link.style.animationDelay = `${index * 0.05}s`;

            // Unique ID to inject title later
            const titleElementId = `title-${file.sha}`;
            
            // Check if we already know the title, otherwise show a pulsing placeholder
            const initialTitle = titleCache[file.path] 
                ? titleCache[file.path] 
                : `<span class="fetching-text">${fileName}</span>`;

            link.innerHTML = `
                <div class="card-header">
                    <span class="icon">&lt;/&gt;</span>
                    <h3 id="${titleElementId}">${initialTitle}</h3>
                </div>
                <div class="path">${file.path}</div>
            `;

            filesContainer.appendChild(link);

            // Fetch and update title asynchronously if not cached
            if (!titleCache[file.path]) {
                getHtmlTitle(file.path).then(title => {
                    const titleEl = document.getElementById(titleElementId);
                    if (titleEl) {
                        titleEl.textContent = title;
                    }
                });
            }
        });
    }

    // 4. Initial Load
    async function loadFiles() {
        filesContainer.innerHTML = "";
        statusContainer.style.display = "block";
        spinner.style.display = "block";

        try {
            const data = await getRepoTree();

            // Filter for HTML files
            fetchedHtmlFiles = data.tree.filter(item =>
                item.type === "blob" &&
                item.path.endsWith(".html") &&
                item.path !== "index.html"
            );

            // Sort alphabetically by path initially
            fetchedHtmlFiles.sort((a, b) => a.path.localeCompare(b.path));

            spinner.style.display = "none";
            
            if (fetchedHtmlFiles.length > 0) {
                statusContainer.style.display = "none";
                renderCards(fetchedHtmlFiles);
            } else {
                statusText.textContent = "No HTML files found in this repository.";
            }

        } catch (err) {
            spinner.style.display = "none";
            statusText.textContent = `Error: ${err.message}`;
        }
    }

    // 5. Handle Live Search (Searches both Path AND Title)
    function filterFiles() {
        const query = searchInput.value.toLowerCase();
        
        const filteredFiles = fetchedHtmlFiles.filter(file => {
            const pathMatches = file.path.toLowerCase().includes(query);
            const titleMatches = titleCache[file.path] && titleCache[file.path].toLowerCase().includes(query);
            
            return pathMatches || titleMatches;
        });
        
        renderCards(filteredFiles);
    }

    // Trigger on load
    loadFiles();
</script>

</body>
</html>
